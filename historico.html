<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Droplet - Histórico</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body class="body-bg" onload="carregarHistorico()">
  <div class="app-container">
    <header class="topbar fade-in-down">
      <div class="logo">
        <span class="logo-icon">💧</span>
        <h1>Droplet</h1>
      </div>

      <div class="topbar-right">
        <button class="icon-button" onclick="voltarInicio()">🏠</button>
        <div class="avatar" id="avatarHistorico">U</div>
        <button class="btn-outline" onclick="logout()">Sair</button>
      </div>
    </header>

    <main class="history-page">
      <section class="card history-main-card fade-in-up">
        <div class="tabs">
          <button class="tab-btn">Hoje</button>
          <button class="tab-btn active">Semana</button>
          <button class="tab-btn">Mês</button>
        </div>

        <h2>Histórico de Consumo</h2>
        <p class="compare-text" id="textoComparativo">
          Você consumiu o mesmo que a semana passada.
        </p>

        <div class="history-layout">
          <div class="chart-panel">
            <div class="chart-box" id="graficoSemana"></div>
          </div>

          <aside class="summary-panel">
            <h3>Resumo</h3>

            <div class="summary-item">
              <span>Meta semanal</span>
              <strong id="metaSemanalTexto">0ml</strong>
            </div>

            <div class="summary-item">
              <span>Esta semana</span>
              <strong id="totalSemanaAtual">0ml</strong>
            </div>

            <div class="mini-progress">
              <div class="mini-progress-fill" id="resumoBarra"></div>
            </div>

            <div class="summary-item">
              <span>Semana passada</span>
              <strong id="totalSemanaPassada">0ml</strong>
            </div>
          </aside>
        </div>

        <div class="bottom-resume">
          <div class="resume-box">
            <span>Esta semana</span>
            <strong id="rodapeSemanaAtual">0ml</strong>
          </div>

          <div class="resume-box">
            <span>Semana passada</span>
            <strong id="rodapeSemanaPassada">0ml</strong>
          </div>
        </div>
      </section>
    </main>
  </div>

  <script src="js/app.js"></script>
</body>
</html>
